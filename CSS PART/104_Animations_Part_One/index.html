<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <title>The Nico Times</title>
    <style>
        @keyframes superIntelFlip {
            from{
                transform: rotateY(0);
            }
            to{
                transform: rotateY(180deg) translateX(100px);
            }
        }
        img {
            border: 10px solid black;
            border-radius: 50%;
            animation: superIntelFlip 5s ease-in-out infinite;
        }
        

    </style>
</head>
<body>
    <img src="img/logo.jpg" alt="">
</body>
</html>
