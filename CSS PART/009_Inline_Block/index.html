<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body{
            margin:20px;
        }
        div{
            width : 300px;
            height : 300px;
            background-color : teal;
            /* display : inline 적용 -> Sucks 너비와 높이를 가질 수 없음 */
            display : inline-block;
            /* width와 height margins를 가질 수 있고 옆에 다른 요소가 올 수 있다 */
            /* inline-block sucks -> because it is old, many problems */
            /* defaults? -> 요소 사이에 빈 공간이 있다 이유는 모름 정해진 형식 없음*/
            /* div에서 가서 margin을 주는 방법이 있겠다 근데 정확하지는 않음*/
            /* Inline block은 반응형을 지원하지 않는다. 창 크기가 달라지면 영향을 줌 */
        }
        /* div = block (display:block) */
    </style>
</head>
<body>
<div></div>
<div></div>
<div></div>
</body>
</html>
