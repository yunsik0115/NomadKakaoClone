<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <title>Home - MY First Website.</title>
        <style>
        html {
            background-color: tomato;
        }

        body {
            margin: 20px;
            padding: 20px;
            background-color: thistle;
        }

        div {
            padding: 20px;
            border : 2px solid black; /* Define the size of border */
        }

        #first {
            background: whitesmoke;
            width: 150px;
            height: 150px;
        }

        #second {
            background-color: teal;
            width: 100px;
            height: 100px;
        }

        #third {
            background-color: wheat;
            width: 50px;
            height: 50px;
        }

        #fourth {
            background-color: blanchedalmond;
            width: 5px;
            height: 5px;
        }
        /* 그래도 padding은 사방에 가질 수 있다. */
        /* Inline 속성의 경우 높이와 너비를 가질 수 없어 위 아래 margin을 가질 수 없다. */
    </style>
</head>
<body>
<div id="first">
    <div id="second">
        <div id="third">
            <div id="fourth">

            </div>
        </div>
    </div>
</div>
</body>
</html>
