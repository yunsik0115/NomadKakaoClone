<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body{
            margin:20px;
            display : flex;
            justify-content: space-between;
            /* flex-direction : column; 주축이 y축이되고 교차축은 수평이 된다. */
            /* flex-direction의 기본값은 row에 해당한다. */
            align-items : center;
            height : 100vh;
            /* flex-wrap : wrap; Wrap 하면 브라우저 크기에 맞춰서 줄어듬 */
            flex-direction : column;
            }
        div{
            display : flex; /* flex children 또한 각각의 flex container가 될 수 있다. 그러나 직접적인 부모 요소에만 적용된다.*/
            /* justify content와 align items 적용하면 그 내에 있는 내용에 적용된다. */
            justify-content: center;
            align-items : center;
            width : 300px;
            font-size: 28px;
            color : white;
            height: 300px;
            background-color : teal;
            /* flex-wrapping 브라우저 사이즈 축소시 행동 wrap ->축소시 다음으로 넘어감*/

        }

        #second {
            background-color : wheat;
        }
        /* flexbox는 child 요소에는 사용하지 말아야 한다. 오직 부모에만 사용한다*/
        /* 예를 들어 div 3개에 원하는게 있다면 body에 적어야 한다. */
    </style>
</head>
<body>
<div>1</div>
<div id="second">2</div>
<div>3</div>
</body>
</html>
