<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <title>Home - MY First Website.</title>
    <link href="styles.css" rel="stylesheet"/>
    <style>
        html {
            background-color : tomato;
        }
        body {
            margin : 20px;
            padding : 20px;
            /* padding : box의 경계로부터 안쪽에 있는 공간 */
            background-color : thistle;
        }
        div {
            padding : 10px;
            }
        /*How to select id? */
        #first {
            /* Characteristic which will be applied to ID : First */
            background : whitesmoke;
            width : 150px;
            height : 150px;
        }

        #second {
            background-color : teal;
            width: 100px;
            height : 100px;
        }

        #third {
            background-color : wheat;
            width : 50px;
            height : 50px;
        }

        #fourth{
            background-color : blanchedalmond;
            width : 25px;
            height : 25px;
        }
    </style>
</head>
<body>
    <div id="first">
        <div id="second">
            <div id="third">
                <div id="fourth">

                </div>
            </div>
        </div>
    </div>
</body>
</html>
