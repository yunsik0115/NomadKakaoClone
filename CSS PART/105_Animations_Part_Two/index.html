<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <title>The Nico Times</title>
    <style>
        @keyframes superIntelFlip {
            0% {
                transform: rotateY(0);
            }
            50% {
                transform: rotateY(180deg) translateY(100px);
            }
            100% {
                transform: rotateY(0);
            }
            /* from to로 하는 경우 translateY 적용이후 처음으로 돌아올때
             뚝 끊겨서 초기상태로 돌아옴, 위와 같은 방법으로 해결할 수 있음
             분기는 여러 개 더 나눌 수 있음*/
        }

        img {
            border: 10px solid black;
            border-radius: 50%;
            width: 200px;
            animation: superIntelFlip 5s ease-in-out infinite;
        }


    </style>
</head>
<body>
    <img src="img/logo.jpg" alt="">
</body>
</html>
