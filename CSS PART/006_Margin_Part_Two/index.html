<!DOCTYPE html>
<html lang="kr">
<head>
  <meta charset="UTF-8">
  <title>Home - MY First Website.</title>
  <link href="styles.css" rel="stylesheet"/>
  <style>
    body {
      margin : 20px 5px 12px 99px;
      /*Assigning One Value -> Applying at all sides*/
      /* Four values -> Applying each side top right bottom left */
      /* Two values : Top Down*/
      background-color : thistle;


    }
    div {
      margin : 50px 15px;
      /* 흰색 box에만 적용하고 싶었는데 전체에 적용되었다? */
      /* div 위쪽 마진 80px 아래쪽도 마찬가지 */
      /* div 마진이 body도 움직였다? -> Collapsing Margins */
      /* 흰 box의 마진과 보라색 box 마진이 같은 값인 경우 하나로 취급된다. */
      height : 150px;
      width : 150px;
      background-color: whitesmoke;
    }
  </style>
</head>
<body>
<div></div>
</body>
</html>
